<!DOCTYPE html>
<html>
<head>
    <title>Eco Impact</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #0b0f1a;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            color: #4ade80;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: #8b5cf6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #6d28d9;
        }

        #result {
            margin-top: 15px;
            font-size: 16px;
        }

        .good { color: #4ade80; }
    </style>

    <script>
        function calculateImpact() {
            var weight = document.getElementById("weight").value;

            if (weight === "") {
                alert("Enter waste amount");
                return;
            }

            // Simple impact calculations
            var co2 = weight * 6;       // kg CO2 saved
            var bricks = Math.floor(weight * 2);
            var trees = (weight * 0.1).toFixed(2);

            document.getElementById("result").innerHTML =
                "🌍 CO₂ Reduced: " + co2 + " kg<br>" +
                "🧱 Eco-Bricks Created: " + bricks + "<br>" +
                "🌳 Trees Saved Equivalent: " + trees;
        }
    </script>
</head>

<body>

<div class="container">

    <h1>🌱 Eco Impact Calculator</h1>

    <div class="card">
        <input type="number" id="weight" placeholder="Enter Plastic Waste (kg)">
        
        <button onclick="calculateImpact()">Calculate Impact</button>

        <p id="result"></p>
    </div>

    <div class="card">
        <h3>Why Eco Impact Matters?</h3>
        <p>
            Recycling plastic into eco-bricks helps reduce pollution,
            lowers carbon emissions, and protects nature.
        </p>
    </div>

</div>

</body>
</html>
