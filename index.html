<!DOCTYPE html>
<html>
<head>
    <title>Eco-Brick App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* LOGIN STYLE */
        #loginPage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #8e2de2, #4a00e0);
        }

        .box {
            width: 300px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            text-align: center;
            color: white;
        }

        input, button {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            margin-bottom: 15px;
        }

        /* DASHBOARD STYLE */
        #dashboard {
            display: none;
            background: #0b0f1a;
            color: white;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
        }

        .card:hover {
            background: rgba(139,92,246,0.2);
        }

        a {
            text-decoration: none;
            color: white;
        }

        .full {
            grid-column: span 2;
        }
    </style>

    <script>
        function loginUser() {
            var username = document.getElementById("username").value;

            if (username === "") {
                alert("Please enter username");
            } else {
                document.getElementById("loginPage").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                document.getElementById("userName").innerText = username;
            }
        }
    </script>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <button onclick="loginUser()">Login</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <div class="header">
        <h2>EcoBrick</h2>
        <div id="userName">User</div>
    </div>

    <div class="container">

        <a href="recycling.html">
            <div class="card">♻️ Recycling Info</div>
        </a>

        <a href="status.html">
            <div class="card">📊 Waste Status</div>
        </a>

        <a href="impact.html">
            <div class="card">🌱 Eco Impact</div>
        </a>

        <a href="materials.html">
            <div class="card">📦 Materials</div>
        </a>

        <a href="ecobrick.html">
            <div class="card full">🧱 Make Eco-Brick</div>
        </a>

    </div>

</div>

</body>
</html>
