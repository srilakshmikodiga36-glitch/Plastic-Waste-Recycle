<!DOCTYPE html>
<html>
<head>
    <title>Username Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #8e2de2, #4a00e0);
        }

        .box {
            width: 300px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: white;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #ddd;
        }

        #output {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>

    <script>
        function loginUser() {
            var username = document.getElementById("username").value;

            if (username === "") {
                alert("Please enter username");
            } else {
                window.location.href="index.html";
            }
        }
    </script>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Enter Username">

    <button onclick="loginUser()">Login</button>

    <p id="output"></p>
</div>

</body>
</html>
